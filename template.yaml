AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  ERP Serverless - Root Template (Nested Stacks Architecture)

Parameters:
  Environment:
    Type: String
    Default: cert
    AllowedValues: [cert, prod]
    Description: Deployment environment (cert or prod)

  LogRetentionDays:
    Type: Number
    Default: 7
    Description: Duration to keep CloudWatch Logs (in days)

Resources:
  # --- INFRASTRUCTURE: LAYERS ---
  LayersStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: infrastructure/layers.yaml
      Parameters:
        Environment: !Ref Environment

  # --- INFRASTRUCTURE: DATABASE ---
  DatabaseStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: infrastructure/database.yaml
      Parameters:
        Environment: !Ref Environment

  # --- INFRASTRUCTURE: EVENTS ---
  EventsStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: infrastructure/events.yaml
      Parameters:
        Environment: !Ref Environment

  # --- CORE LOGIC: SALES MODULE ---
  SalesModuleStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: infrastructure/sales-module.yaml
      Parameters:
        Environment: !Ref Environment
        EventBusName: !GetAtt EventsStack.Outputs.EventBusName
        SqlServerLayerArn: !GetAtt LayersStack.Outputs.SqlServerLayerArn
        SalesTableName: !GetAtt DatabaseStack.Outputs.SalesTableName

  # --- ENTRY POINT: API ---
  ApiStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: infrastructure/api.yaml
      Parameters:
        Environment: !Ref Environment
        CreateSaleFunctionArn: !GetAtt SalesModuleStack.Outputs.CreateSaleFunctionArn
        LogRetentionDays: !Ref LogRetentionDays

Outputs:
  SalesApiUrl:
    Description: "API Gateway endpoint URL for Sales module"
    Value: !GetAtt ApiStack.Outputs.SalesApiUrl
  SalesApiId:
    Description: "The ID of the Sales API"
    Value: !GetAtt ApiStack.Outputs.SalesApiId
