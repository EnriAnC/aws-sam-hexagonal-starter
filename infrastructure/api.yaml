AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  API Infrastructure for ERP Serverless

Parameters:
  Environment:
    Type: String
    Default: cert
  CreateSaleFunctionArn:
    Type: String
  LogRetentionDays:
    Type: Number
    Default: 7

Resources:
  # --- INFRASTRUCTURE: API ---
  SalesApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Environment
      TracingEnabled: true
      AccessLogSetting:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
        Format: '$context.identity.sourceIp $context.authorizer.claims.sub [$context.requestTime] "$context.httpMethod $context.resourcePath $context.protocol" $context.status $context.requestId $context.integration.status $context.integration.latency'
      DefinitionBody:
        openapi: 3.0.1
        info:
          title: !Sub "Sales API - ${Environment}"
          version: "1.0"
        paths:
          /sales:
            post:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CreateSaleFunctionArn}/invocations"
              responses: {}
            options:
              x-amazon-apigateway-integration:
                type: mock
                requestTemplates:
                  application/json: "{\"statusCode\": 200}"
                responses:
                  default:
                    statusCode: "200"
                    responseParameters:
                      method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
                      method.response.header.Access-Control-Allow-Methods: "'OPTIONS,POST,GET,PUT,DELETE'"
                      method.response.header.Access-Control-Allow-Origin: "'*'"
                    responseTemplates:
                      application/json: ""
              responses:
                200:
                  description: Default response para CORS
                  headers:
                    Access-Control-Allow-Headers:
                      type: string
                    Access-Control-Allow-Methods:
                      type: string
                    Access-Control-Allow-Origin:
                      type: string

  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/apigateway/SalesApi-${Environment}"
      RetentionInDays: !Ref LogRetentionDays

  # --- PERMISSIONS ---
  CreateSalePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref CreateSaleFunctionArn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${SalesApi}/*"

Outputs:
  SalesApiUrl:
    Description: "API Gateway endpoint URL for Sales module"
    Value: !Sub "https://${SalesApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/sales/"
  SalesApiId:
    Description: "The ID of the Sales API"
    Value: !Ref SalesApi
