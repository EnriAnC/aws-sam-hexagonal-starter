name: Deploy ERP Sales Module

on:
  push:
    branches:
      - main
      - develop

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup SAM
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: SAM Build
        run: sam build

      - name: SAM Deploy (Cert)
        if: github.ref == 'refs/heads/develop'
        run: sam deploy --config-env cert --no-confirm-changeset --no-fail-on-empty-changeset

      - name: SAM Deploy (Prod)
        if: github.ref == 'refs/heads/main'
        run: sam deploy --config-env prod --no-fail-on-empty-changeset
